<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceTask | Modern Task Management</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="light-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="layout-dashboard"></i>
                    <span>VoiceTask</span>
                </div>
                <button class="mobile-close" id="sidebarClose">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i data-lucide="home"></i>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-view="tasks">
                    <i data-lucide="list-todo"></i>
                    <span>My Tasks</span>
                </a>
                <a href="#" class="nav-item" data-view="workflow">
                    <i data-lucide="git-branch"></i>
                    <span>Workflow</span>
                </a>
                <a href="#" class="nav-item" data-view="settings">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="profile">
                    <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" alt="User" class="avatar">
                    <div class="profile-info">
                        <span class="name">Guest User</span>
                        <span class="status">Online</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="navbar">
                <div class="nav-left">
                    <button class="mobile-toggle" id="mobileToggle">
                        <i data-lucide="menu"></i>
                    </button>
                    <h1 id="viewTitle">Dashboard</h1>
                </div>
                <div class="nav-right">
                    <div class="search-bar">
                        <i data-lucide="search"></i>
                        <input type="text" placeholder="Search tasks..." id="taskSearch">
                    </div>
                    <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                        <i data-lucide="sun" id="themeIcon"></i>
                    </button>
                    <button class="btn btn-primary" id="createTaskBtn">
                        <i data-lucide="plus"></i>
                        <span>New Task</span>
                    </button>
                </div>
            </header>

            <div class="content-area" id="mainView">
                <!-- Views will be dynamically loaded here -->
            </div>
        </main>

        <!-- Voice Recognition UI Overlay -->
        <div class="voice-overlay" id="voiceOverlay">
            <div class="voice-content">
                <div class="voice-waves">
                    <span></span><span></span><span></span><span></span><span></span>
                </div>
                <p id="speechTranscript">Listening...</p>
                <p class="voice-hint">Try: "Add task Finish project with high priority"</p>
                <button class="btn btn-secondary" id="stopVoice">Stop</button>
            </div>
        </div>

        <!-- Float Microphone Button -->
        <button class="mic-button" id="micBtn">
            <i data-lucide="mic"></i>
        </button>

        <!-- Task Modal -->
        <div class="modal" id="taskModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modalTitle">Create New Task</h2>
                    <button class="modal-close"><i data-lucide="x"></i></button>
                </div>
                <form id="taskForm">
                    <div class="form-group">
                        <label for="taskTitle">Task Title</label>
                        <input type="text" id="taskTitle" required placeholder="What needs to be done?">
                    </div>
                    <div class="form-group">
                        <label for="taskDesc">Description</label>
                        <textarea id="taskDesc" rows="3" placeholder="Add more details..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="taskPriority">Priority</label>
                            <select id="taskPriority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="taskDeadline">Deadline</label>
                            <input type="date" id="taskDeadline">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline modal-close">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Task</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div class="toast-container" id="toastContainer"></div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
